<!DOCTYPE html>
<html>
<head>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffd6e7);
font-family:sans-serif;
overflow:hidden;
}

img{
width:200px;
}

.message{
margin-top:25px;
font-size:26px;
color:#7a0026;
text-align:center;
max-width:70%;
}

.heart{
position:absolute;
font-size:20px;
opacity:.6;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh) scale(.5);}
100%{transform:translateY(-10vh) scale(1.2);}
}

</style>

</head>

<body>

<img src="rose.gif">

<div class="message">
Write your message here
</div>

<script>

for(let i=0;i<20;i++){
let h=document.createElement("div")
h.className="heart"
h.innerHTML="❤"
h.style.left=Math.random()*100+"vw"
h.style.animationDuration=(4+Math.random()*4)+"s"
document.body.appendChild(h)
}

</script>

</body>
</html>
