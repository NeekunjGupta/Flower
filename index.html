<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A Rose For You</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffd1ff);
overflow:hidden;
}

.rose{
position:relative;
width:120px;
height:120px;
}

.petal{
position:absolute;
width:80px;
height:80px;
background:#c4002f;
border-radius:50% 50% 0 50%;
transform-origin:bottom right;
opacity:0;
}

.p1{ transform:rotate(0deg) scale(.2); animation:bloom 1s forwards .5s;}
.p2{ transform:rotate(60deg) scale(.2); animation:bloom 1s forwards 1s;}
.p3{ transform:rotate(120deg) scale(.2); animation:bloom 1s forwards 1.5s;}
.p4{ transform:rotate(180deg) scale(.2); animation:bloom 1s forwards 2s;}
.p5{ transform:rotate(240deg) scale(.2); animation:bloom 1s forwards 2.5s;}
.p6{ transform:rotate(300deg) scale(.2); animation:bloom 1s forwards 3s;}

@keyframes bloom{
0%{
opacity:0;
transform:scale(.1) rotate(0deg);
}
100%{
opacity:1;
transform:scale(1) rotate(360deg);
}
}

.center{
position:absolute;
width:40px;
height:40px;
background:#8b0000;
border-radius:50%;
top:40px;
left:40px;
opacity:0;
animation:centerBloom 1s forwards 3.5s;
}

@keyframes centerBloom{
to{
opacity:1;
transform:scale(1.2);
}
}

.message{
margin-top:40px;
font-size:24px;
color:#8b0000;
opacity:0;
animation:show 2s forwards;
animation-delay:4s;
text-align:center;
max-width:70%;
}

@keyframes show{
to{opacity:1;}
}

</style>
</head>

<body>

<div class="rose">
<div class="petal p1"></div>
<div class="petal p2"></div>
<div class="petal p3"></div>
<div class="petal p4"></div>
<div class="petal p5"></div>
<div class="petal p6"></div>
<div class="center"></div>
</div>

<div class="message">
Write your message here
</div>

</body>
</html>
