<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Rose For You</title>

<style>

body{
    background:#000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    font-family:Arial;
    color:white;
}

.rose{
    font-size:0px;
    animation:bloom 3s ease forwards;
}

@keyframes bloom{
    0%{
        transform:scale(0);
        opacity:0;
    }

    60%{
        transform:scale(1.3);
        opacity:1;
    }

    100%{
        transform:scale(1);
    }
}

.rose span{
    font-size:120px;
}

.message{
    margin-top:30px;
    font-size:22px;
    opacity:0;
    animation:showText 2s ease forwards;
    animation-delay:3s;
    max-width:70%;
    text-align:center;
}

@keyframes showText{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="rose">
<span>🌹</span>
</div>

<div class="message">
Your message goes here.
</div>

</body>
</html>
