<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Rose For You</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
}

svg{
width:220px;
}

path{
fill:none;
stroke:#c4002f;
stroke-width:3;
stroke-dasharray:1000;
stroke-dashoffset:1000;
animation:draw 4s forwards;
}

@keyframes draw{
to{
stroke-dashoffset:0;
}
}

.message{
margin-top:40px;
font-size:24px;
color:#8b0000;
opacity:0;
animation:show 2s forwards;
animation-delay:4s;
text-align:center;
max-width:70%;
}

@keyframes show{
to{
opacity:1;
}
}

.heart{
position:absolute;
font-size:20px;
animation:float 6s linear infinite;
opacity:.6;
}

@keyframes float{
0%{transform:translateY(100vh) scale(.5);}
100%{transform:translateY(-10vh) scale(1.2);}
}

</style>
</head>

<body>

<svg viewBox="0 0 200 200">
<path d="M100 150 C120 120 150 120 140 90
C130 70 100 80 100 100
C100 80 70 70 60 90
C50 120 80 120 100 150"/>
</svg>

<div class="message">
Write your message here
</div>

<script>

for(let i=0;i<15;i++){
let h=document.createElement("div")
h.className="heart"
h.innerHTML="❤"
h.style.left=Math.random()*100+"vw"
h.style.animationDuration=(4+Math.random()*4)+"s"
document.body.appendChild(h)
}

</script>

</body>
</html>
