<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Blooming Rose</title>

<style>

body{
margin:0;
overflow:hidden;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffd6e7);
font-family:sans-serif;
}

canvas{
display:block;
}

#message{
position:absolute;
bottom:18%;
width:100%;
text-align:center;
font-size:26px;
color:#7a0026;
opacity:0;
transition:opacity 2s;
}

.heart{
position:absolute;
font-size:20px;
opacity:.6;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh) scale(.5);}
100%{transform:translateY(-10vh) scale(1.2);}
}

</style>
</head>

<body>

<canvas id="rose"></canvas>

<div id="message">
Write your message here
</div>

<script>

const canvas = document.getElementById("rose")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let t = 0

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.strokeStyle="#c4002f"
ctx.lineWidth=2

ctx.beginPath()

for(let theta=0; theta<t; theta+=0.02){

let r = 150*Math.sin(5*theta)

let x = canvas.width/2 + r*Math.cos(theta)
let y = canvas.height/2 + r*Math.sin(theta)

if(theta===0) ctx.moveTo(x,y)
else ctx.lineTo(x,y)

}

ctx.stroke()

t+=0.03

if(t<Math.PI*4){
requestAnimationFrame(draw)
}
else{
document.getElementById("message").style.opacity=1
}

}

draw()

/* floating hearts */

for(let i=0;i<20;i++){
let h=document.createElement("div")
h.className="heart"
h.innerHTML="❤"
h.style.left=Math.random()*100+"vw"
h.style.animationDuration=(4+Math.random()*4)+"s"
document.body.appendChild(h)
}

</script>

</body>
</html>
